name: Build TrackEdge App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ UPDATED

      - name: Setup Node
        uses: actions/setup-node@v4   # ✅ UPDATED
        with:
          node-version: 20   # safe + stable

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: TrackEdge-App
          path: dist/*.exe
